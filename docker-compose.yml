services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD:-YourStrong!Passw0rd}
      - MSSQL_PID=${MSSQL_PID:-Developer}
    ports:
      - "${DB_PORT:-1433}:1433"
    volumes:
      - forge-db-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      target: development
    environment:
      - DATABASE_URL=sqlserver://db:1433;database=forge;user=sa;password=${SA_PASSWORD:-YourStrong!Passw0rd};encrypt=true;trustServerCertificate=true
      - PORT=3001
      - NODE_ENV=development
      - BYPASS_AUTH=true
    ports:
      - "3001:3001"
      - "5173:5173"

volumes:
  forge-db-data:
